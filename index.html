<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ESP32 Industrial Monitoring</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  background:#0b1220;
  color:white;
  font-family:Segoe UI;
}

h1{
  text-align:center;
  padding:20px;
  font-weight:500;
}

.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(350px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#111827;
  border-radius:12px;
  padding:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.card h3{
  font-weight:400;
  margin-bottom:10px;
  color:#94a3b8;
}

.bigValue{
  font-size:48px;
  font-weight:600;
  text-align:center;
}

.smallNote{
  text-align:right;
  font-size:12px;
  color:#64748b;
}

canvas{
  width:100% !important;
  height:250px !important;
}
</style>
</head>

<body>

<h1>ESP32 Monitoring Dashboard</h1>

<div class="grid">

<div class="card">
<div class="smallNote">Last 10 minutes</div>
<h3>Temperature</h3>
<div class="bigValue" id="tempValue">-- °C</div>
<canvas id="tempGauge"></canvas>
</div>

<div class="card">
<div class="smallNote">Last 10 minutes</div>
<h3>Humidity</h3>
<div class="bigValue" id="humValue">-- %</div>
<canvas id="humGauge"></canvas>
</div>

<div class="card">
<div class="smallNote">Last 10 minutes</div>
<h3>Air Quality</h3>
<div class="bigValue" id="airValue">--</div>
<canvas id="airGauge"></canvas>
</div>

<div class="card">
<div class="smallNote">Last 24 hours</div>
<h3>Temperature</h3>
<canvas id="tempChart"></canvas>
</div>

<div class="card">
<div class="smallNote">Last 24 hours</div>
<h3>Humidity</h3>
<canvas id="humChart"></canvas>
</div>

<div class="card">
<div class="smallNote">Last 24 hours</div>
<h3>Air Quality</h3>
<canvas id="airChart"></canvas>
</div>

</div>

<script>
// ================= FIREBASE =================
var firebaseConfig = {
  apiKey: "AIzaSyCVuJ2s68xscizT2YRvIqMaeFmAKGhXny0",
  authDomain: "esp32-iot-monitoring-sistem.firebaseapp.com",
  databaseURL: "https://esp32-iot-monitoring-sistem-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "esp32-iot-monitoring-sistem",
  storageBucket: "esp32-iot-monitoring-sistem.firebasestorage.app",
  messagingSenderId: "740171871840",
  appId: "1:740171871840:web:1414091cd16c5bec427505"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// ================= GAUGE CHART =================
function createGauge(id, max){
  return new Chart(document.getElementById(id),{
    type:'doughnut',
    data:{
      datasets:[{
        data:[0,max],
        backgroundColor:['#22c55e','#1f2937'],
        borderWidth:0
      }]
    },
    options:{
      circumference:180,
      rotation:270,
      cutout:'70%',
      plugins:{legend:{display:false}},
      responsive:true
    }
  });
}

var tempGauge = createGauge("tempGauge",50);
var humGauge = createGauge("humGauge",100);
var airGauge = createGauge("airGauge",2000);

// ================= LINE CHART =================
function createLine(id,label,color){
  return new Chart(document.getElementById(id),{
    type:'line',
    data:{
      labels:[],
      datasets:[{
        label:label,
        data:[],
        borderColor:color,
        backgroundColor:color+"22",
        fill:true,
        tension:0.3
      }]
    },
    options:{
      plugins:{legend:{labels:{color:"white"}}},
      scales:{
        x:{ticks:{color:"white"}},
        y:{ticks:{color:"white"}}
      }
    }
  });
}

var tempChart = createLine("tempChart","Temperature","#22c55e");
var humChart = createLine("humChart","Humidity","#3b82f6");
var airChart = createLine("airChart","Air Quality","#facc15");

// ================= REALTIME CURRENT =================
db.ref("sensor").on("value", snap=>{
  var d = snap.val();
  if(!d) return;

  document.getElementById("tempValue").innerText = d.temperature+" °C";
  document.getElementById("humValue").innerText = d.humidity+" %";
  document.getElementById("airValue").innerText = d.airQuality;

  tempGauge.data.datasets[0].data=[d.temperature,50-d.temperature];
  tempGauge.update();

  humGauge.data.datasets[0].data=[d.humidity,100-d.humidity];
  humGauge.update();

  airGauge.data.datasets[0].data=[d.airQuality,2000-d.airQuality];
  airGauge.update();
});

// ================= HISTORY =================
db.ref("sensorHistory").limitToLast(50).on("value", snap=>{

  let labels=[], t=[], h=[], a=[];

  snap.forEach(child=>{
    let d = child.val();
    labels.push(new Date(d.timestamp).toLocaleTimeString());
    t.push(d.temperature);
    h.push(d.humidity);
    a.push(d.airQuality);
  });

  tempChart.data.labels = labels;
  tempChart.data.datasets[0].data = t;
  tempChart.update();

  humChart.data.labels = labels;
  humChart.data.datasets[0].data = h;
  humChart.update();

  airChart.data.labels = labels;
  airChart.data.datasets[0].data = a;
  airChart.update();
});
</script>

</body>
</html>
