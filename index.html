<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ESP32 Industrial Monitoring PRO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  background:#0b1220;
  color:white;
  font-family:Segoe UI;
}

h1{
  text-align:center;
  padding:25px;
}

.grid-top{
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:25px;
  padding:20px 40px;
  max-width:1400px;
  margin:auto;
}

.grid-chart{
  display:grid;
  grid-template-columns: repeat(2,1fr);  /* 2 chart per baris */
  gap:30px;
  padding:20px;
  max-width:1100px;   /* lebih kecil */
  margin:auto;
}

.chart-card{
  padding:30px;
}

canvas{
  width:100% !important;
  height:320px !important;
}

@media(max-width:1100px){ .grid{grid-template-columns:repeat(2,1fr);} }
@media(max-width:700px){ .grid{grid-template-columns:1fr;} }

.card{
  background:#111827;
  border-radius:16px;
  padding:25px;
  box-shadow:0 0 30px rgba(0,0,0,0.6);
}

.bigValue{
  font-size:48px;
  text-align:center;
  margin-bottom:10px;
}

.rangeButtons{
  text-align:center;
  margin-bottom:20px;
}

.rangeButtons button{
  background:#1f2937;
  color:white;
  border:none;
  padding:8px 15px;
  margin:5px;
  border-radius:8px;
  cursor:pointer;
}

.rangeButtons button.active{
  background:#22c55e;
}

canvas{
  width:100% !important;
  height:260px !important;
}
</style>
</head>

<body>

<h1>ESP32 Industrial Monitoring</h1>

<div class="rangeButtons">
<button onclick="setRange('now')" class="active">Now</button>
<button onclick="setRange('1h')">1 Hour</button>
<button onclick="setRange('6h')">6 Hour</button>
<button onclick="setRange('1d')">1 Day</button>
<button onclick="setRange('1w')">1 Week</button>
</div>

<div class="grid-top">

<div class="card">
<h3>Temperature</h3>
<div class="bigValue" id="tempValue">-- °C</div>
</div>

<div class="card">
<h3>Humidity</h3>
<div class="bigValue" id="humValue">-- %</div>
</div>

<div class="card">
<h3>Air Quality</h3>
<div class="bigValue" id="airValue">--</div>
</div>

</div>

<div class="grid-chart">

<div class="card chart-card">
<h3>Temperature</h3>
<canvas id="tempChart"></canvas>
</div>

<div class="card chart-card">
<h3>Humidity</h3>
<canvas id="humChart"></canvas>
</div>

<div class="card chart-card">
<h3>Air Quality</h3>
<canvas id="airChart"></canvas>
</div>

</div>

<script>
// ================= FIREBASE =================
var firebaseConfig = {
  apiKey: "AIzaSyCVuJ2s68xscizT2YRvIqMaeFmAKGhXny0",
  authDomain: "esp32-iot-monitoring-sistem.firebaseapp.com",
  databaseURL: "https://esp32-iot-monitoring-sistem-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "esp32-iot-monitoring-sistem",
  storageBucket: "esp32-iot-monitoring-sistem.firebasestorage.app",
  messagingSenderId: "740171871840",
  appId: "1:740171871840:web:1414091cd16c5bec427505"

};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

let currentRange = "now";

// ================= CHART FUNCTION =================
function createChart(id,label,color){
  return new Chart(document.getElementById(id),{
    type:'line',
    data:{
      labels:[],
      datasets:[{
        label:label,
        data:[],
        borderColor:color,
        backgroundColor:color+"22",
        fill:true,
        tension:0.3
      }]
    },
    options:{
      interaction:{mode:'index',intersect:false},
      hover:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:"white"}},
        tooltip:{mode:'index',intersect:false}
      },
      scales:{
        x:{ticks:{color:"white"}},
        y:{ticks:{color:"white"}}
      }
    }
  });
}

var tempChart = createChart("tempChart","Temperature","#22c55e");
var humChart = createChart("humChart","Humidity","#3b82f6");
var airChart = createChart("airChart","Air Quality","#facc15");

// ================= REALTIME CURRENT =================
db.ref("sensor").on("value", snap=>{
  let d = snap.val();
  if(!d) return;

  document.getElementById("tempValue").innerText = d.temperature+" °C";
  document.getElementById("humValue").innerText = d.humidity+" %";
  document.getElementById("airValue").innerText = d.airQuality;
});

// ================= RANGE HANDLER =================
function setRange(range){
  currentRange = range;

  document.querySelectorAll(".rangeButtons button")
    .forEach(btn=>btn.classList.remove("active"));

  event.target.classList.add("active");

  loadHistory();
}

function loadHistory(){

  db.ref("sensorHistory").once("value", snap=>{

    let dataArr = [];

    snap.forEach(child=>{
      dataArr.push(child.val());
    });

    let now = Date.now();
    let filtered = [];

    if(currentRange==="1h")
      filtered = dataArr.filter(d=> now-d.timestamp <= 3600000);

    else if(currentRange==="6h")
      filtered = dataArr.filter(d=> now-d.timestamp <= 21600000);

    else if(currentRange==="1d")
      filtered = dataArr.filter(d=> now-d.timestamp <= 86400000);

    else if(currentRange==="1w"){
      let daily={};
      dataArr.forEach(d=>{
        if(now-d.timestamp <= 604800000){
          let day=new Date(d.timestamp).toDateString();
          if(!daily[day]) daily[day]={t:0,h:0,a:0,c:0};
          daily[day].t+=d.temperature;
          daily[day].h+=d.humidity;
          daily[day].a+=d.airQuality;
          daily[day].c++;
        }
      });

      let labels=[], t=[], h=[], a=[];
      Object.keys(daily).slice(-7).forEach(day=>{
        let x=daily[day];
        labels.push(day);
        t.push((x.t/x.c).toFixed(1));
        h.push((x.h/x.c).toFixed(1));
        a.push((x.a/x.c).toFixed(0));
      });

      updateCharts(labels,t,h,a);
      return;
    }

    else{
      updateCharts([],[],[],[]);
      return;
    }

    let labels=[], t=[], h=[], a=[];
    filtered.slice(-50).forEach(d=>{
      labels.push(new Date(d.timestamp).toLocaleTimeString([],{
        hour:'2-digit',minute:'2-digit'
      }));
      t.push(d.temperature);
      h.push(d.humidity);
      a.push(d.airQuality);
    });

    updateCharts(labels,t,h,a);
  });
}

function updateCharts(labels,t,h,a){
  tempChart.data.labels=labels;
  tempChart.data.datasets[0].data=t;
  tempChart.update();

  humChart.data.labels=labels;
  humChart.data.datasets[0].data=h;
  humChart.update();

  airChart.data.labels=labels;
  airChart.data.datasets[0].data=a;
  airChart.update();
}

loadHistory();
</script>

</body>
</html>
