<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ESP32 Monitoring</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Gauge -->
<script src="https://cdn.jsdelivr.net/npm/canvas-gauges/gauge.min.js"></script>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

h1{
  text-align:center;
  padding:20px;
  font-weight:600;
  letter-spacing:1px;
}

.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(320px,1fr));
  gap:25px;
  padding:25px;
}

.card{
  background: rgba(30,41,59,0.8);
  backdrop-filter: blur(10px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 25px rgba(0,255,200,0.1);
  transition:0.3s;
}

.card:hover{
  box-shadow:0 0 40px rgba(0,255,200,0.3);
  transform:translateY(-5px);
}

.card h3{
  text-align:center;
  margin-bottom:10px;
}

canvas{
  width:100% !important;
  height:280px !important;
}
</style>
</head>

<body>

<h1>🌿 ESP32 Pro Monitoring Dashboard</h1>

<div class="grid">

<div class="card">
<h3>Temperature</h3>
<canvas id="tempGauge"></canvas>
</div>

<div class="card">
<h3>Humidity</h3>
<canvas id="humGauge"></canvas>
</div>

<div class="card">
<h3>Air Quality</h3>
<canvas id="airGauge"></canvas>
</div>

<div class="card">
<h3>Temperature (Last 50)</h3>
<canvas id="tempChart"></canvas>
</div>

<div class="card">
<h3>Humidity (Last 50)</h3>
<canvas id="humChart"></canvas>
</div>

<div class="card">
<h3>Air Quality (Last 50)</h3>
<canvas id="airChart"></canvas>
</div>

</div>

<script>
// ================= FIREBASE CONFIG =================
var firebaseConfig = {
  apiKey: "AIzaSyCVuJ2s68xscizT2YRvIqMaeFmAKGhXny0",
  authDomain: "esp32-iot-monitoring-sistem.firebaseapp.com",
  databaseURL: "https://esp32-iot-monitoring-sistem-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "esp32-iot-monitoring-sistem",
  storageBucket: "esp32-iot-monitoring-sistem.firebasestorage.app",
  messagingSenderId: "740171871840",
  appId: "1:740171871840:web:1414091cd16c5bec427505"

};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// ================= GAUGES =================
function createGauge(id, unit, min, max){
  return new RadialGauge({
    renderTo: id,
    width: 280,
    height: 280,
    units: unit,
    minValue: min,
    maxValue: max,
    value: 0,
    animation: true,
    animationDuration: 800,
    colorPlate:"#0f172a",
    colorMajorTicks:"#94a3b8",
    colorNumbers:"#ffffff",
    colorNeedle:"#22d3ee",
    colorNeedleEnd:"#22d3ee",
    colorValueBoxBackground:"#0f172a",
    highlights:[
      {from:max*0.7,to:max,color:"rgba(255,0,0,.3)"}
    ]
  }).draw();
}

var tempGauge = createGauge("tempGauge","°C",0,50);
var humGauge = createGauge("humGauge","%",0,100);
var airGauge = createGauge("airGauge","AQ",0,2000);

// ================= CHART =================
function createChart(id,label,color){
  return new Chart(document.getElementById(id),{
    type:'line',
    data:{
      labels:[],
      datasets:[{
        label:label,
        data:[],
        borderColor:color,
        borderWidth:2,
        fill:true,
        backgroundColor:color+"33",
        tension:0.4
      }]
    },
    options:{
      responsive:true,
      animation:true,
      plugins:{
        legend:{labels:{color:"white"}}
      },
      scales:{
        x:{ticks:{color:"white"}},
        y:{ticks:{color:"white"}}
      }
    }
  });
}

var tempChart = createChart("tempChart","Temperature","#22d3ee");
var humChart = createChart("humChart","Humidity","#4ade80");
var airChart = createChart("airChart","Air Quality","#facc15");

// ================= REALTIME CURRENT =================
db.ref("sensor").on("value", snap=>{
  var d = snap.val();
  if(!d) return;

  tempGauge.value = d.temperature;
  humGauge.value = d.humidity;
  airGauge.value = d.airQuality;
});

// ================= HISTORY =================
db.ref("sensorHistory").limitToLast(50).on("value", snap=>{

  let labels=[], t=[], h=[], a=[];

  snap.forEach(child=>{
    let d = child.val();
    labels.push(new Date(d.timestamp).toLocaleTimeString());
    t.push(d.temperature);
    h.push(d.humidity);
    a.push(d.airQuality);
  });

  tempChart.data.labels = labels;
  tempChart.data.datasets[0].data = t;
  tempChart.update();

  humChart.data.labels = labels;
  humChart.data.datasets[0].data = h;
  humChart.update();

  airChart.data.labels = labels;
  airChart.data.datasets[0].data = a;
  airChart.update();
});
</script>

</body>
</html>
